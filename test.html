<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .popup {
    position: absolute;
    top: 50%;
    left: 50%;
    /* margin-top: 300px; */
    height: 462px;
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.25);
    width: 400px;
    padding: 25px 35px;
    visibility:hidden;
    transition: top 0ms ease-in-out 200ms, opacity 200ms ease-in-out 0ms,
      transform 200ms ease-in-out 200ms;
    background: rgba(39, 92, 111, 0.2);
    position: relative;
    box-shadow: inset -7.55px 7.55px 7.55px 0px rgba(255, 255, 255, 0.28),
      inset 7.55px -7.55px 7.55px 0px rgba(182, 182, 182, 0.28);
    overflow: hidden;
    backdrop-filter: blur(40px);
    z-index: 1000;
  }

  #popup-login {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #popup-signup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .popup.active {
    top: 50%;
    opacity: 1;
    visibility:visible;
    transform: translate(-50%, -50%) scale(1);
    transition: top 0ms ease-in-out 0ms, opacity 200ms ease-in-out 0ms,
      transform 200ms ease-in-out 200ms;
  }

  .popup .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 15px;
    height: 15px;
    color: red;
    font-family: "Roboto-Regular", sans-serif;
    text-align: center;
    line-height: 15px;
    border-radius: 15px;
    cursor: pointer;
  }

  .form-element h2 {
    color: #000000;
    text-align: center;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 28px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
  }

  .form-element form {
    display: block;
    width: 100%;
    position: relative;
    text-align: center;
  }

  .form-element {
    display: block;
    width: 90%;
    margin: 0 auto;
    text-align: center;
  }

  .form-element .email {
    border-style: dashed;
    border-color:#000000;
    border-width: 1px;
    padding: 10px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    color:#ffffff;
    text-align: left;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 23px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
    padding: 0 0 0 10px;
    margin-bottom: 20px;
  }

  .form-element .password {
    border-style: dashed;
    border-color:#000000;
    border-width: 1px;
    padding: 10px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    /* width: 400px; */
    height: 56px;
    color:#ffffff;
    text-align: left;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 23px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
    padding: 0 0 0 10px;
  }

  .email i {
    position: absolute;
    top: 15px;
    right: 10px;
  }

  .password i {
    position: absolute;
    top: 15px;
    right: 10px;
  }

  .email input {
    width: 400px;
    padding: 16px;
    background-color: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 23px;
  }

  .password input {
    width: 400px;
    padding: 16px;
    background-color: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 23px;
  }

  #email::placeholder {
    color: white;
    font-size: 23px;
  }

  #pwd::placeholder {
    color: white;
    font-size: 23px;
  }

  .form-element .check-container {
    padding: 10px;
    display: flex;
    flex-direction: row;
    gap: 10px;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .check-container input {
    background: #ffffff;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    justify-content: flex-start;
    flex-shrink: 0;
    width: 15px;
    height: 15px;
    position: absolute;
    top: 20px;
    left: 0;
    z-index: 1000;
  }

  .check-container .remember-me {
    color: #ffffff;
    text-align: left;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 16px;
    line-height: 140%;
    font-weight: 400;
    position: absolute;
    top: 20px;
    left: 30px;
  }

  .form-element .forget-container {
    padding: 10px;
    display: flex;
    flex-direction: row;
    gap: 10px;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .forget-container .forgot-password {
    color: #ffffff;
    text-align: left;
    font-family: sans-serif;
    font-size: 16px;
    line-height: 140%;
    font-weight: 400;
    text-decoration: none;
    position: absolute;
    top: 0px;
    right: 0;
  }

  .form-element .submit-container {
    background: #275c6f;
    border-radius: 8px;
    padding: 8px 16px 8px 16px;
    display: flex;
    flex-direction: row;
    gap: 8px;
    align-items: center;
    justify-content: center;
    width: 350px;
    height: 48px;
    position: relative;
    border: none;
    outline: none;
    margin-top: 40px;
    margin-left: 0px;
  }
  
  .submit-container .login {
    color: #ffffff;
    text-align: left;
    font-family: sans-serif;
    font-size: 28px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .form-element .bottom-account {
    position: relative;
    text-align: center;
    margin-left: -110px;
  }

  .bottom-account p {
    display: inline-block;
    color:#ffffff;
    text-align: left;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 16px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
    margin-left: 100px;
  }
  
  .bottom-account a {
    display: inline-block;
    text-decoration: none;
    color: #000000;
    text-align: left;
    font-family: "Roboto-Regular", sans-serif;
    font-size: 16px;
    line-height: 140%;
    font-weight: 400;
    position: relative;
  }


  @media (max-width: 768px) {
    .popup {
      position: absolute;
      top: 170px;
      width: 240px;
    }

    .popup.active {
      margin-top: 100px;
    }

    .popup .close-btn {
      width: 20px;
      height: 20px;
    }

    .form-element h2 {
      font-size: 23px;
    }

    .form-element {
      width: 100%;
    }

    .form-element .email {
      text-align: center;
      width: 270px;
      margin-left: -20px;
    }

    .form-element .password {
      text-align: center;
      width: 270px;
      margin-left: -20px;
    }

    .email input {
      width: 400px;
      padding: 16px;
      background-color: transparent;
      border: none;
      outline: none;
      margin-left: -10px;
      color: white;
      font-size: 20px;
    }

    .password input {
      width: 400px;
      padding: 16px;
      background-color: transparent;
      border: none;
      outline: none;
      margin-left: -10px;
      color: white;
      font-size: 20px;
    }

    #email::placeholder {
      color: white;
      font-size: 20px;
    }

    #pwd::placeholder {
      color: white;
      font-size: 20px;
    }

    .check-container input {
      margin-left: -20px;
    }

    .check-container .remember-me {
      margin-left: -30px;
    }

    .forget-container .forgot-password {
      margin-right: -25px;
    }

    .form-element .submit-container {
      width: 100%;
      margin-left: 0;
    }

    .submit-container .login {
      font-size: 23px;
    }

    .form-element .bottom-account {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    .bottom-account p {
      display: block;
      width: 89%;
      text-align: left;
      padding: 0;
      margin-left: 90px;
    }
    .bottom-account a {
      width: 27%;
      display: block;
      text-decoration: none;
      color: #000000;
      text-align: left;
      font-family: "Roboto-Regular", sans-serif;
      font-size: 16px;
      line-height: 140%;
      font-weight: 400;
      position: relative;
      padding: 0;
      /* margin-left: -3px; */
      text-align: right;
    }
  }

  </style>
</head>
<body>
  <a href="javascript:void(0)" class="sign-up" id="show-signup" onclick="togglePopup('signup')">Sign Up</a>
  <a href="javascript:void(0)" class="login" id="show-login" onclick="togglePopup('login')">Login</a>

  <!-- START OF POP UP FOR LOGIN SECTION -->
  <div class="popup" id="popup-login">
    <div class="close-btn" onclick="togglePopup('login')"><b>X</b></div>
    <div class="form-element">
      <h2>Login</h2>
        <form action="lms-dashboard.html">
          <div class="email">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="l-email" placeholder="Email">
          </div>
          <div class="password">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="l-pwd" placeholder="Password">
          </div>
          <div class="check-container">
            <input type="checkbox">
            <div class="remember-me">Remember me</div>
          </div>
          <div class="forget-container">
            <a class="forgot-password" href="">Forgot Password</a>
          </div>
          <button class="submit-container">
            <p class="login">Login</p>
          </button>
          <div class="bottom-account">
            <p>Don’t have an account yet?</p>
            <a class="sign-up" href="javascript:void(0)" onclick="togglePopup('signup')"> Sign Up</a>
          </div>
        </form>
      </div>
    </div>

    <!-- START OF POP UP FOR SIGNUP SECTION -->
  <div class="popup" id="popup-signup">
    <div class="close-btn" onclick="togglePopup('signup')"><b>X</b></div>
    <div class="form-element">
      <h2>Sign Up</h2>
        <form action="lms-dashboard.html">
          <div class="email">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="s-email" placeholder="Email">
          </div>
          <div class="password">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="s-pwd" placeholder="Password">
          </div>
          <div class="check-container">
            <input type="checkbox">
            <div class="remember-me">Remember me</div>
          </div>
          <div class="forget-container">
            <a class="forgot-password" href="">Forgot Password</a>
          </div>
          <button class="submit-container">
            <p class="login">Sign Up</p>
          </button>
          <div class="bottom-account">
            <p>Already have an account?</p>
            <a class="login" href="javascript:void(0)" onclick="togglePopup('login')"> Login</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      function togglePopup(type) {
    var popupLogin = document.getElementById('popup-login');
    var popupSignup = document.getElementById('popup-signup');

    if (type === 'login') {
      popupLogin.classList.toggle('active');
      popupSignup.classList.remove('active');
    } else if (type === 'signup') {
      popupSignup.classList.toggle('active');
      popupLogin.classList.remove('active');
    }
  }

    </script>
</body>
</html>
